<!-- 
  Logo AMDA — version SVG autonome
  Inspiré de la composition fournie : lettrage italique bleu-violet,
  second "A" remplacé par un anneau-boussole (étoile à 4 branches + aiguille),
  slogan en sarcelle en dessous.
  Couleurs : --logo-blue:#5B6FE8 ; --logo-ring:#C9C2AE ; --logo-teal:#1E9AA0 ; --logo-ink:#1A1A1A
-->
<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="amda-logo-title">
  <title id="amda-logo-title">AMDA — l'espace d'émergence du terroir marocain</title>

  <!-- Lettrage "AM" -->
  <text x="20" y="118" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="600"
        font-size="92" fill="#5B6FE8" letter-spacing="-2">AM</text>

  <!-- Anneau-boussole remplaçant le "D" stylisé -->
  <g transform="translate(330,72)">
    <circle r="46" fill="none" stroke="#C9C2AE" stroke-width="10"/>
    <circle r="46" fill="none" stroke="#5B6FE8" stroke-width="3"/>
    <!-- aiguille diagonale -->
    <line x1="-30" y1="-30" x2="58" y2="58" stroke="#1A1A1A" stroke-width="2.5"/>
    <!-- étoile à 4 branches, pointe nord-ouest -->
    <path d="M -34 -34 L -28 -22 L -16 -16 L -28 -10 L -34 2 L -40 -10 L -52 -16 L -40 -22 Z" fill="#1A1A1A"/>
    <!-- étoile à 4 branches, pointe centrale (sud-est) -->
    <path d="M 8 8 L 16 18 L 26 26 L 16 34 L 8 44 L 0 34 L -10 26 L 0 18 Z" fill="#1A1A1A"/>
  </g>

  <!-- Lettrage "DA" -->
  <text x="392" y="118" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="600"
        font-size="92" fill="#5B6FE8" letter-spacing="-2">da</text>

  <!-- Slogan -->
  <text x="320" y="168" font-family="Inter, Arial, sans-serif" font-size="19" letter-spacing="2"
        fill="#1E9AA0" text-anchor="middle" text-transform="uppercase">
    L'ESPACE D'ÉMERGENCE DU TERROIR MAROCAIN
  </text>
</svg>
